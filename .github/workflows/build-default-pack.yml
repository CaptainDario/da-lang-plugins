name: Build Default Pack

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      yomitan_version:
        description: 'Yomitan version tag to bundle (e.g. v24.9.14.0). Leave empty for latest stable.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-text-selection:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install esbuild
        run: npm install -g esbuild

      - name: Build text-selection plugin
        run: node scripts/build-text-selection.mjs "${{ inputs.yomitan_version }}"

      - name: Commit updated plugin
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packs/default/
          git diff --cached --quiet && echo "No changes to commit." || git commit -m "chore: update text-selection bundle (yomitan ${{ inputs.yomitan_version || 'latest' }})" && git push
